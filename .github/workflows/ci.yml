# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_network:
        description: "Run network/integration tests"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * *" # 每天 UTC 02:00（北京时间 10:00）

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests (no network/db)
        run: make unit

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-unit
          path: reports/

  db:
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autofw
          POSTGRES_PASSWORD: autofw
          POSTGRES_DB: autofw
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autofw -d autofw"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGDATABASE: autofw
      PGUSER: autofw
      PGPASSWORD: autofw
      PGCONNECT_TIMEOUT: "3"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run db tests
        run: make db

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-db
          path: reports/

  network:
    runs-on: ubuntu-latest
    needs: unit
    # 只在定时任务或手动触发时跑真外网
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_network == 'true') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run network/integration tests
        run: make network

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-network
          path: reports/
